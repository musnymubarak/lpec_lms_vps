server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/moodle_access.log;
    error_log  /var/log/nginx/moodle_error.log;

    # Max upload size (match Moodle config)
    client_max_body_size 800M;
    client_body_timeout 600s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block access to sensitive files
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ /(config\.php|version\.php|composer\.(json|lock)|package\.json|npm-shrinkwrap\.json|Gruntfile\.js|phpunit\.xml|behat\.yml) {
        deny all;
    }

    # Moodle rewrite rules
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler with slasharguments support
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_index index.php;
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Timeouts for long operations (upgrades, backups, etc.)
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_connect_timeout 60;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
