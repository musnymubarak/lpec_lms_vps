services:
  # ── Moodle Application (PHP-FPM + Nginx) ──
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moodle-app
    restart: unless-stopped
    ports:
      - "8004:80"
    volumes:
      # Persist moodledata (uploaded files, cache, sessions, etc.)
      - moodledata:/var/www/moodledata
      # Optional: mount config.php separately for easy editing
      - ./docker/config.php:/var/www/html/config.php:ro
    environment:
      - MOODLE_DB_HOST=moodle-db
      - MOODLE_DB_NAME=moodle
      - MOODLE_DB_USER=moodle
      - MOODLE_DB_PASS=${MOODLE_DB_PASSWORD:-SecurePassword123!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - moodle-network



volumes:
  moodledata:
    name: moodle-data



networks:
  moodle-network:
    name: moodle-network
    driver: bridge
